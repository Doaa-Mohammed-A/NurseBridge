kind = "web"
previewPath = "/"
title = "NurseBridge: The Clinical Compass"
version = "1.0.0"
id = "nursebridge-clinical-compass"

[[services]]
localPort = 5000
name = "NurseBridge App"
paths = ["/"]

[services.development]
run = "cd /home/runner/workspace/artifacts/nursebridge && streamlit run app.py --server.port 5000 --server.address 0.0.0.0 --server.headless true --server.enableStaticServing true --server.enableCORS false --server.enableXsrfProtection false"

[services.production]
run = "cd /home/runner/workspace/artifacts/nursebridge && streamlit run app.py --server.port 8080 --server.address 0.0.0.0 --server.headless true --server.enableStaticServing true --server.enableCORS false --server.enableXsrfProtection false"
